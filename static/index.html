<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrashSight Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
        }

        /* ========== 左侧会话栏 ========== */
        .sidebar {
            width: 260px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h2 {
            font-size: 14px;
            color: #f59e0b;
        }
        .btn-new-chat {
            padding: 6px 12px;
            background: #f59e0b;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-new-chat:hover { background: #fbbf24; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .session-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .session-item:hover { background: #2a2a2a; }
        .session-item.active { background: #2a2a2a; border-left: 3px solid #f59e0b; }
        .session-item .title {
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .session-item .time {
            font-size: 11px;
            color: #555;
            margin-left: 8px;
            white-space: nowrap;
        }
        .session-item .btn-delete {
            display: none;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .session-item:hover .btn-delete { display: block; }
        .session-item:hover .time { display: none; }
        .session-item .btn-delete:hover { color: #f87171; background: #2a2a2a; }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid #2a2a2a;
            font-size: 11px;
            color: #555;
            text-align: center;
        }

        /* ========== 右侧主区域 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* 顶栏 */
        .header {
            padding: 14px 24px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #f59e0b;
        }
        .header .status {
            font-size: 12px;
            color: #666;
        }

        /* 聊天区 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #f59e0b;
            color: #000;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 4px;
        }
        .message.assistant code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .message.assistant pre {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
        }
        .message.thinking {
            align-self: flex-start;
            background: transparent;
            border: 1px dashed #333;
            color: #666;
            font-size: 13px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 快捷按钮 */
        .chips {
            padding: 8px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            padding: 6px 12px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover { border-color: #f59e0b; color: #f59e0b; }

        /* 输入区 */
        .input-area {
            padding: 16px 24px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #f59e0b; }
        .input-area input::placeholder { color: #555; }
        .btn-send {
            padding: 12px 24px;
            background: #f59e0b;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-send:hover { background: #fbbf24; }
        .btn-send:disabled { background: #555; cursor: not-allowed; }

        /* Markdown 渲染 */
        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            margin: 12px 0 6px;
            color: #f59e0b;
        }
        .message.assistant h1 { font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .message.assistant h2 { font-size: 16px; }
        .message.assistant h3 { font-size: 14px; color: #e0e0e0; }
        .message.assistant table {
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 12px;
            width: 100%;
        }
        .message.assistant th, .message.assistant td {
            border: 1px solid #333;
            padding: 6px 10px;
            text-align: left;
        }
        .message.assistant th { background: #2a2a2a; color: #f59e0b; }
        .message.assistant td strong {
            font-size: 14px;
            color: #fff;
        }
        /* 核心指标卡片表格居中对齐 */
        .message.assistant td[style*="center"], .message.assistant th[style*="center"] {
            text-align: center;
        }

        /* 快捷指令栏 */
        .quick-panel {
            padding: 12px 24px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }
        .quick-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .quick-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .quick-field label {
            font-size: 12px;
            color: #888;
            font-weight: 500;
        }
        .quick-row select, .quick-row input[type="date"] {
            padding: 8px 12px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
            height: 36px;
        }
        .quick-row select:focus, .quick-row input[type="date"]:focus { border-color: #f59e0b; }
        .quick-row select { min-width: 160px; }
        .quick-row input[type="date"] { min-width: 140px; }
        .btn-quick {
            padding: 8px 16px;
            background: #f59e0b;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 36px;
        }
        .btn-quick:hover { background: #fbbf24; }

        /* 多选版本标签组件 */
        .version-multiselect {
            position: relative;
            min-width: 240px;
        }
        .version-input-box {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 36px;
            padding: 4px 8px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .version-input-box:focus-within,
        .version-input-box.active { border-color: #f59e0b; }
        .version-input-box .placeholder {
            font-size: 13px;
            color: #555;
        }
        .version-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: #f59e0b;
            border: 1px solid #f59e0b;
            border-radius: 4px;
            font-size: 12px;
            color: #000;
            font-weight: 500;
            white-space: nowrap;
        }
        .version-tag .tag-remove {
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            opacity: 0.7;
            margin-left: 2px;
        }
        .version-tag .tag-remove:hover { opacity: 1; }
        .version-dropdown-arrow {
            margin-left: auto;
            padding-left: 8px;
            color: #666;
            font-size: 10px;
        }

        /* 版本下拉面板 */
        .version-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            min-width: 260px;
            max-height: 280px;
            overflow-y: auto;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            padding: 6px 0;
        }
        .version-dropdown.show { display: block; }
        .version-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            transition: background 0.15s;
        }
        .version-group-header:hover { background: #2a2a2a; }
        .version-group-header .arrow {
            font-size: 10px;
            transition: transform 0.2s;
            color: #666;
        }
        .version-group-header .arrow.expanded { transform: rotate(90deg); }
        .version-group-header .group-checkbox {
            width: 16px;
            height: 16px;
            accent-color: #f59e0b;
        }
        .version-group-header .group-name { flex: 1; }
        .version-group-header .group-count {
            font-size: 11px;
            color: #666;
            margin-left: 4px;
        }
        .version-group-items {
            display: none;
            padding-left: 16px;
        }
        .version-group-items.expanded { display: block; }
        .version-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            transition: background 0.15s;
        }
        .version-item:hover { background: #2a2a2a; color: #e0e0e0; }
        .version-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #f59e0b;
        }

        /* 快捷时间按钮 */
        .time-shortcuts {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }
        .time-shortcut-btn {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-shortcut-btn:hover { border-color: #f59e0b; color: #f59e0b; }
        .time-shortcut-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            gap: 12px;
        }
        .empty-state .icon { font-size: 48px; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>
    <!-- 左侧会话栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 会话列表</h2>
            <button class="btn-new-chat" onclick="newChat()">+ 新对话</button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 动态填充 -->
        </div>
        <div class="sidebar-footer">CrashSight Agent v0.1</div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main">
        <div class="header">
            <h1>🔥 CrashSight Agent</h1>
            <span class="status" id="status">就绪</span>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">你好！我是 CrashSight 崩溃分析助手。

你可以这样问我：
• 安卓体验服 3.7 昨天的崩溃
• iOS 最近一周崩溃率趋势
• Top1 正式服有没有
• 对比这周和上周的 Top5</div>
        </div>

        <!-- 快捷指令栏（选择项目/版本/时间 → 生成指令） -->
        <div class="quick-panel" id="quickPanel">
            <div class="quick-row">
                <div class="quick-field">
                    <label>选择项目</label>
                    <select id="qProject" onchange="onProjectChange()">
                        <option value="">选择项目</option>
                        <option value="android_exp" data-name="安卓体验服">UAMobile体验版_Android</option>
                        <option value="android_prod" data-name="安卓正式服">UAMobile正式版_Android</option>
                        <option value="ios_exp" data-name="iOS体验服">UAMobile体验版_iOS</option>
                        <option value="ios_prod" data-name="iOS正式服">UAMobile正式版_iOS</option>
                        <option value="harmony_exp" data-name="鸿蒙体验版">UAMobile体验版_Harmony</option>
                        <option value="harmony_prod" data-name="鸿蒙正式服">UAMobile正式版_Harmony</option>
                    </select>
                </div>
                <div class="quick-field">
                    <label>版本号（可多选）</label>
                    <div class="version-multiselect" id="versionMultiselect">
                        <div class="version-input-box" id="versionInputBox" onclick="toggleVersionDropdown(event)">
                            <span class="placeholder" id="versionPlaceholder">先选项目</span>
                            <span class="version-dropdown-arrow">▼</span>
                        </div>
                        <div class="version-dropdown" id="versionDropdown">
                            <!-- 动态填充分组版本列表 -->
                        </div>
                    </div>
                </div>
                <div class="quick-field">
                    <label>开始日期</label>
                    <input type="date" id="qDateStart">
                </div>
                <div class="quick-field">
                    <label>结束日期</label>
                    <input type="date" id="qDateEnd">
                </div>
                <div class="quick-field">
                    <label>&nbsp;</label>
                    <button class="btn-quick" onclick="generateCommand()">生成指令</button>
                </div>
                <span id="versionLoading" style="font-size:12px;color:#666;display:none;">加载版本中...</span>
            </div>
            <div class="time-shortcuts">
                <span class="time-shortcut-btn" onclick="setTimeShortcut('today', this)">今天</span>
                <span class="time-shortcut-btn" onclick="setTimeShortcut('7d', this)">最近7天</span>
                <span class="time-shortcut-btn active" onclick="setTimeShortcut('15d', this)">最近15天</span>
            </div>
        </div>

        <div class="chips">
            <span class="chip" onclick="fillInput(this)">Top1 是历史问题吗</span>
            <span class="chip" onclick="fillInput(this)">崩溃率趋势</span>
            <span class="chip" onclick="fillInput(this)">Top1 完整堆栈</span>
            <span class="chip" onclick="fillInput(this)">TAPD 什么状态</span>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="输入你的问题..." autocomplete="off"
                   onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const input = document.getElementById('input');
        const btnSend = document.getElementById('btnSend');
        const statusEl = document.getElementById('status');
        const sessionList = document.getElementById('sessionList');

        let isLoading = false;

        // ========== 会话管理 ==========
        let sessions = JSON.parse(localStorage.getItem('cs_sessions') || '[]');
        let currentSessionId = null;

        function saveSessions() {
            localStorage.setItem('cs_sessions', JSON.stringify(sessions));
        }

        function getSession(id) {
            return sessions.find(s => s.id === id);
        }

        function newChat() {
            const id = 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            const session = {
                id,
                title: '新对话',
                messages: [],
                createdAt: new Date().toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            };
            sessions.unshift(session);
            saveSessions();
            switchSession(id);
        }

        function switchSession(id) {
            currentSessionId = id;
            const session = getSession(id);
            if (!session) return;

            // 渲染聊天记录
            chatArea.innerHTML = '';
            if (session.messages.length === 0) {
                chatArea.innerHTML = `<div class="message assistant">你好！我是 CrashSight 崩溃分析助手。

你可以这样问我：
• 安卓体验服 3.7 昨天的崩溃
• iOS 最近一周崩溃率趋势
• Top1 正式服有没有
• 对比这周和上周的 Top5</div>`;
            } else {
                session.messages.forEach(msg => {
                    addMessage(msg.content, msg.role, false);
                });
            }

            renderSessionList();
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function deleteSession(id, event) {
            event.stopPropagation();
            sessions = sessions.filter(s => s.id !== id);
            saveSessions();
            if (currentSessionId === id) {
                if (sessions.length > 0) {
                    switchSession(sessions[0].id);
                } else {
                    newChat();
                }
            } else {
                renderSessionList();
            }
        }

        function renderSessionList() {
            sessionList.innerHTML = sessions.map(s => `
                <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="switchSession('${s.id}')">
                    <span class="title">${s.title}</span>
                    <span class="time">${s.createdAt}</span>
                    <button class="btn-delete" onclick="deleteSession('${s.id}', event)">✕</button>
                </div>
            `).join('');
        }

        // 初始化
        if (sessions.length === 0) {
            newChat();
        } else {
            currentSessionId = sessions[0].id;
            switchSession(currentSessionId);
        }

        // ========== 消息管理 ==========
        function addMessage(content, role, save = true) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'assistant') {
                div.innerHTML = renderMarkdown(content);
            } else {
                div.textContent = content;
            }
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            // 保存到 session
            if (save && currentSessionId) {
                const session = getSession(currentSessionId);
                if (session) {
                    session.messages.push({ role, content });
                    // 用第一条用户消息作为标题
                    if (role === 'user' && session.title === '新对话') {
                        session.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
                        renderSessionList();
                    }
                    saveSessions();
                }
            }

            return div;
        }

        // 配置 marked.js
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
        });

        function renderMarkdown(text) {
            // 使用 marked 解析 Markdown，DOMPurify 防 XSS
            const rawHtml = marked.parse(text);
            return DOMPurify.sanitize(rawHtml, {
                ADD_ATTR: ['target'],
                ALLOWED_TAGS: [
                    'h1','h2','h3','h4','p','br','strong','em','code','pre',
                    'table','thead','tbody','tr','th','td',
                    'ul','ol','li','a','blockquote','hr','span',
                ],
            });
        }

        // ========== 发送消息（SSE 流式）==========
        async function sendMessage() {
            const query = input.value.trim();
            if (!query || isLoading) return;

            isLoading = true;
            btnSend.disabled = true;
            input.value = '';
            statusEl.textContent = '执行中...';

            addMessage(query, 'user');

            // 创建思考过程容器
            const processDiv = document.createElement('div');
            processDiv.className = 'message thinking';
            processDiv.style.whiteSpace = 'pre-wrap';
            processDiv.innerHTML = '🧠 开始分析...\n';
            chatArea.appendChild(processDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            let finalAnswer = '';

            try {
                const resp = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, session_id: currentSessionId }),
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 解析 SSE 消息（以 \n\n 分隔）
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop(); // 最后一个可能不完整

                    for (const part of parts) {
                        if (!part.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(part.slice(6));
                            
                            if (event.type === 'answer') {
                                // 最终回答
                                finalAnswer = event.message;
                            } else if (event.type === 'agent_end') {
                                // 结束
                            } else {
                                // 中间状态 — 更新思考过程
                                processDiv.innerHTML += event.message + '\n';
                                chatArea.scrollTop = chatArea.scrollHeight;
                                statusEl.textContent = event.message.slice(0, 30);
                            }
                        } catch (e) {}
                    }
                }

                // 移除思考过程，显示最终回答
                processDiv.remove();
                if (finalAnswer) {
                    addMessage(finalAnswer, 'assistant');
                } else {
                    addMessage('处理完成，但未收到最终回答。', 'assistant');
                }

            } catch (e) {
                processDiv.remove();
                // 降级到普通接口
                try {
                    const resp = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, session_id: currentSessionId }),
                    });
                    const data = await resp.json();
                    if (data.success) {
                        addMessage(data.answer, 'assistant');
                    } else {
                        addMessage('❌ ' + (data.error || '请求失败'), 'assistant');
                    }
                } catch (e2) {
                    addMessage('❌ 网络错误，请确认后端服务已启动 (python app.py)', 'assistant');
                }
            }

            isLoading = false;
            btnSend.disabled = false;
            statusEl.textContent = '就绪';
            input.focus();
        }

        // Chip 点击 → 填入输入框，不发送
        function fillInput(el) {
            input.value = el.textContent;
            input.focus();
        }

        // ========== 版本多选组件 ==========
        let selectedVersions = [];
        let versionGroups = {};
        let allVersions = [];

        // 初始化日期（默认最近15天）
        function initDates() {
            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - 14);
            document.getElementById('qDateEnd').value = formatDate(end);
            document.getElementById('qDateStart').value = formatDate(start);
        }
        function formatDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }
        initDates();

        // 时间快捷按钮
        function setTimeShortcut(type, el) {
            document.querySelectorAll('.time-shortcut-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const end = new Date();
            const start = new Date();
            if (type === 'today') { /* start = today */ }
            else if (type === '7d') { start.setDate(start.getDate() - 6); }
            else if (type === '15d') { start.setDate(start.getDate() - 14); }
            document.getElementById('qDateEnd').value = formatDate(end);
            document.getElementById('qDateStart').value = formatDate(start);
        }

        // 选项目后动态加载版本列表
        async function onProjectChange() {
            const projectSelect = document.getElementById('qProject');
            const loading = document.getElementById('versionLoading');
            const projectId = projectSelect.value;

            // 清空已选版本
            selectedVersions = [];
            versionGroups = {};
            allVersions = [];
            renderVersionTags();

            if (!projectId) {
                document.getElementById('versionPlaceholder').textContent = '先选项目';
                document.getElementById('versionDropdown').innerHTML = '';
                return;
            }

            document.getElementById('versionPlaceholder').textContent = '加载中...';
            loading.style.display = 'inline';

            try {
                const resp = await fetch(`/api/versions/${projectId}`);
                const data = await resp.json();

                if (data.success && data.data && data.data.length > 0) {
                    allVersions = data.data;
                    // 按前缀分组（取前两位，如 3.7.* / 0.8.*）
                    versionGroups = {};
                    allVersions.forEach(v => {
                        const parts = v.split('.');
                        const prefix = parts.length >= 2 ? parts[0] + '.' + parts[1] + '.*' : v;
                        if (!versionGroups[prefix]) versionGroups[prefix] = [];
                        versionGroups[prefix].push(v);
                    });
                    renderVersionDropdown();
                    document.getElementById('versionPlaceholder').textContent = '选择版本';
                } else {
                    document.getElementById('versionPlaceholder').textContent = '无版本数据';
                    document.getElementById('versionDropdown').innerHTML = '';
                }
            } catch (e) {
                document.getElementById('versionPlaceholder').textContent = '加载失败';
                document.getElementById('versionDropdown').innerHTML = '';
            }

            loading.style.display = 'none';
        }

        function renderVersionDropdown() {
            const dropdown = document.getElementById('versionDropdown');
            let html = '';
            for (const [prefix, versions] of Object.entries(versionGroups)) {
                const allChecked = versions.every(v => selectedVersions.includes(v));
                const someChecked = versions.some(v => selectedVersions.includes(v));
                html += `<div class="version-group">
                    <div class="version-group-header" onclick="toggleGroup(this, event)">
                        <span class="arrow">▶</span>
                        <input type="checkbox" class="group-checkbox" 
                            ${allChecked ? 'checked' : ''} 
                            ${someChecked && !allChecked ? 'indeterminate' : ''}
                            onclick="toggleGroupCheck(this, '${prefix}', event)">
                        <span class="group-name">${prefix}</span>
                        <span class="group-count">(${versions.length})</span>
                    </div>
                    <div class="version-group-items">
                        ${versions.map(v => `
                            <div class="version-item" onclick="toggleVersion('${v}', event)">
                                <input type="checkbox" ${selectedVersions.includes(v) ? 'checked' : ''}>
                                <span>${v}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
            dropdown.innerHTML = html;
            // 设置 indeterminate 状态
            dropdown.querySelectorAll('.version-group').forEach(g => {
                const cb = g.querySelector('.group-checkbox');
                const items = g.querySelectorAll('.version-item input[type="checkbox"]');
                const checked = [...items].filter(i => i.checked).length;
                if (checked > 0 && checked < items.length) cb.indeterminate = true;
            });
        }

        function toggleVersionDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('versionDropdown');
            const inputBox = document.getElementById('versionInputBox');
            if (!allVersions.length) return;
            dropdown.classList.toggle('show');
            inputBox.classList.toggle('active', dropdown.classList.contains('show'));
        }

        function toggleGroup(header, event) {
            event.stopPropagation();
            const arrow = header.querySelector('.arrow');
            const items = header.nextElementSibling;
            arrow.classList.toggle('expanded');
            items.classList.toggle('expanded');
        }

        function toggleGroupCheck(checkbox, prefix, event) {
            event.stopPropagation();
            const versions = versionGroups[prefix] || [];
            if (checkbox.checked) {
                versions.forEach(v => { if (!selectedVersions.includes(v)) selectedVersions.push(v); });
            } else {
                versions.forEach(v => { selectedVersions = selectedVersions.filter(sv => sv !== v); });
            }
            renderVersionTags();
            renderVersionDropdown();
        }

        function toggleVersion(version, event) {
            event.stopPropagation();
            if (selectedVersions.includes(version)) {
                selectedVersions = selectedVersions.filter(v => v !== version);
            } else {
                selectedVersions.push(version);
            }
            renderVersionTags();
            renderVersionDropdown();
        }

        function removeVersion(version, event) {
            event.stopPropagation();
            selectedVersions = selectedVersions.filter(v => v !== version);
            renderVersionTags();
            renderVersionDropdown();
        }

        function renderVersionTags() {
            const inputBox = document.getElementById('versionInputBox');
            const placeholder = document.getElementById('versionPlaceholder');
            // 移除已有标签
            inputBox.querySelectorAll('.version-tag').forEach(t => t.remove());

            if (selectedVersions.length === 0) {
                placeholder.style.display = 'inline';
            } else {
                placeholder.style.display = 'none';
                const arrow = inputBox.querySelector('.version-dropdown-arrow');
                selectedVersions.forEach(v => {
                    const tag = document.createElement('span');
                    tag.className = 'version-tag';
                    tag.innerHTML = `${v}<span class="tag-remove" onclick="removeVersion('${v}', event)">×</span>`;
                    inputBox.insertBefore(tag, arrow);
                });
            }
        }

        // 点击外部关闭下拉
        document.addEventListener('click', function(e) {
            const ms = document.getElementById('versionMultiselect');
            if (!ms.contains(e.target)) {
                document.getElementById('versionDropdown').classList.remove('show');
                document.getElementById('versionInputBox').classList.remove('active');
            }
        });

        // 快捷指令：选择项目/版本/时间 → 生成自然语言指令填入输入框
        function generateCommand() {
            const projectSelect = document.getElementById('qProject');
            const projectName = projectSelect.selectedOptions[0]?.dataset?.name || '';

            if (!projectName) {
                alert('请选择项目');
                return;
            }

            let cmd = projectName;
            if (selectedVersions.length > 0) {
                cmd += ' ' + selectedVersions.join(',');
            }
            const startDate = document.getElementById('qDateStart').value;
            const endDate = document.getElementById('qDateEnd').value;
            if (startDate && endDate) {
                cmd += ' ' + startDate + '~' + endDate;
            }
            cmd += ' 的崩溃top10';

            input.value = cmd;
            input.focus();
        }
    </script>
</body>
</html>
