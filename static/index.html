<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrashSight Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
        }

        /* ========== 左侧会话栏 ========== */
        .sidebar {
            width: 260px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h2 {
            font-size: 14px;
            color: #f59e0b;
        }
        .btn-new-chat {
            padding: 6px 12px;
            background: #f59e0b;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-new-chat:hover { background: #fbbf24; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .session-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .session-item:hover { background: #2a2a2a; }
        .session-item.active { background: #2a2a2a; border-left: 3px solid #f59e0b; }
        .session-item .title {
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .session-item .time {
            font-size: 11px;
            color: #555;
            margin-left: 8px;
            white-space: nowrap;
        }
        .session-item .btn-delete {
            display: none;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .session-item:hover .btn-delete { display: block; }
        .session-item:hover .time { display: none; }
        .session-item .btn-delete:hover { color: #f87171; background: #2a2a2a; }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid #2a2a2a;
            font-size: 11px;
            color: #555;
            text-align: center;
        }

        /* ========== 右侧主区域 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* 顶栏 */
        .header {
            padding: 14px 24px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #f59e0b;
        }
        .header .status {
            font-size: 12px;
            color: #666;
        }

        /* 聊天区 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #f59e0b;
            color: #000;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 4px;
        }
        .message.assistant code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .message.assistant pre {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
        }
        .message.thinking {
            align-self: flex-start;
            background: transparent;
            border: 1px dashed #333;
            color: #666;
            font-size: 13px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 快捷按钮 */
        .chips {
            padding: 8px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            padding: 6px 12px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover { border-color: #f59e0b; color: #f59e0b; }

        /* 输入区 */
        .input-area {
            padding: 16px 24px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #f59e0b; }
        .input-area input::placeholder { color: #555; }
        .btn-send {
            padding: 12px 24px;
            background: #f59e0b;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-send:hover { background: #fbbf24; }
        .btn-send:disabled { background: #555; cursor: not-allowed; }

        /* Markdown 渲染 */
        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            margin: 8px 0 4px;
            color: #f59e0b;
        }
        .message.assistant h1 { font-size: 16px; }
        .message.assistant h2 { font-size: 15px; }
        .message.assistant h3 { font-size: 14px; }
        .message.assistant table {
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 12px;
            width: 100%;
        }
        .message.assistant th, .message.assistant td {
            border: 1px solid #333;
            padding: 4px 8px;
            text-align: left;
        }
        .message.assistant th { background: #2a2a2a; color: #f59e0b; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            gap: 12px;
        }
        .empty-state .icon { font-size: 48px; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>
    <!-- 左侧会话栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 会话列表</h2>
            <button class="btn-new-chat" onclick="newChat()">+ 新对话</button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 动态填充 -->
        </div>
        <div class="sidebar-footer">CrashSight Agent v0.1</div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main">
        <div class="header">
            <h1>🔥 CrashSight Agent</h1>
            <span class="status" id="status">就绪</span>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">你好！我是 CrashSight 崩溃分析助手。

你可以这样问我：
• 安卓体验服 3.7 昨天的崩溃
• iOS 最近一周崩溃率趋势
• Top1 正式服有没有
• 对比这周和上周的 Top5</div>
        </div>

        <div class="chips">
            <span class="chip" onclick="fillInput(this)">安卓体验服 昨天的崩溃</span>
            <span class="chip" onclick="fillInput(this)">iOS体验服 最近一周趋势</span>
            <span class="chip" onclick="fillInput(this)">鸿蒙体验版 今天的数据</span>
            <span class="chip" onclick="fillInput(this)">Top1 是历史问题吗</span>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="输入你的问题..." autocomplete="off"
                   onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const input = document.getElementById('input');
        const btnSend = document.getElementById('btnSend');
        const statusEl = document.getElementById('status');
        const sessionList = document.getElementById('sessionList');

        let isLoading = false;

        // ========== 会话管理 ==========
        let sessions = JSON.parse(localStorage.getItem('cs_sessions') || '[]');
        let currentSessionId = null;

        function saveSessions() {
            localStorage.setItem('cs_sessions', JSON.stringify(sessions));
        }

        function getSession(id) {
            return sessions.find(s => s.id === id);
        }

        function newChat() {
            const id = 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            const session = {
                id,
                title: '新对话',
                messages: [],
                createdAt: new Date().toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            };
            sessions.unshift(session);
            saveSessions();
            switchSession(id);
        }

        function switchSession(id) {
            currentSessionId = id;
            const session = getSession(id);
            if (!session) return;

            // 渲染聊天记录
            chatArea.innerHTML = '';
            if (session.messages.length === 0) {
                chatArea.innerHTML = `<div class="message assistant">你好！我是 CrashSight 崩溃分析助手。

你可以这样问我：
• 安卓体验服 3.7 昨天的崩溃
• iOS 最近一周崩溃率趋势
• Top1 正式服有没有
• 对比这周和上周的 Top5</div>`;
            } else {
                session.messages.forEach(msg => {
                    addMessage(msg.content, msg.role, false);
                });
            }

            renderSessionList();
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function deleteSession(id, event) {
            event.stopPropagation();
            sessions = sessions.filter(s => s.id !== id);
            saveSessions();
            if (currentSessionId === id) {
                if (sessions.length > 0) {
                    switchSession(sessions[0].id);
                } else {
                    newChat();
                }
            } else {
                renderSessionList();
            }
        }

        function renderSessionList() {
            sessionList.innerHTML = sessions.map(s => `
                <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="switchSession('${s.id}')">
                    <span class="title">${s.title}</span>
                    <span class="time">${s.createdAt}</span>
                    <button class="btn-delete" onclick="deleteSession('${s.id}', event)">✕</button>
                </div>
            `).join('');
        }

        // 初始化
        if (sessions.length === 0) {
            newChat();
        } else {
            currentSessionId = sessions[0].id;
            switchSession(currentSessionId);
        }

        // ========== 消息管理 ==========
        function addMessage(content, role, save = true) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'assistant') {
                div.innerHTML = renderMarkdown(content);
            } else {
                div.textContent = content;
            }
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            // 保存到 session
            if (save && currentSessionId) {
                const session = getSession(currentSessionId);
                if (session) {
                    session.messages.push({ role, content });
                    // 用第一条用户消息作为标题
                    if (role === 'user' && session.title === '新对话') {
                        session.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
                        renderSessionList();
                    }
                    saveSessions();
                }
            }

            return div;
        }

        function renderMarkdown(text) {
            let html = text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\|(.+)\|/g, function(match) {
                    if (match.match(/^\|[\s\-:]+\|$/)) return '';
                    const cells = match.split('|').filter(c => c.trim());
                    const isHeader = cells.some(c => c.includes('**'));
                    const tag = isHeader ? 'th' : 'td';
                    return '<tr>' + cells.map(c => `<${tag}>${c.trim().replace(/\*\*/g, '')}</${tag}>`).join('') + '</tr>';
                })
                .replace(/^[•\-\*] (.+)$/gm, '• $1')
                .replace(/\n/g, '<br>');

            if (html.includes('<tr>')) {
                html = html.replace(/((?:<tr>.*?<\/tr><br>?)+)/gs, '<table>$1</table>');
            }
            return html;
        }

        // ========== 发送消息（SSE 流式）==========
        async function sendMessage() {
            const query = input.value.trim();
            if (!query || isLoading) return;

            isLoading = true;
            btnSend.disabled = true;
            input.value = '';
            statusEl.textContent = '执行中...';

            addMessage(query, 'user');

            // 创建思考过程容器
            const processDiv = document.createElement('div');
            processDiv.className = 'message thinking';
            processDiv.style.whiteSpace = 'pre-wrap';
            processDiv.innerHTML = '🧠 开始分析...\n';
            chatArea.appendChild(processDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            let finalAnswer = '';

            try {
                const resp = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, session_id: currentSessionId }),
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 解析 SSE 消息（以 \n\n 分隔）
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop(); // 最后一个可能不完整

                    for (const part of parts) {
                        if (!part.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(part.slice(6));
                            
                            if (event.type === 'answer') {
                                // 最终回答
                                finalAnswer = event.message;
                            } else if (event.type === 'agent_end') {
                                // 结束
                            } else {
                                // 中间状态 — 更新思考过程
                                processDiv.innerHTML += event.message + '\n';
                                chatArea.scrollTop = chatArea.scrollHeight;
                                statusEl.textContent = event.message.slice(0, 30);
                            }
                        } catch (e) {}
                    }
                }

                // 移除思考过程，显示最终回答
                processDiv.remove();
                if (finalAnswer) {
                    addMessage(finalAnswer, 'assistant');
                } else {
                    addMessage('处理完成，但未收到最终回答。', 'assistant');
                }

            } catch (e) {
                processDiv.remove();
                // 降级到普通接口
                try {
                    const resp = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, session_id: currentSessionId }),
                    });
                    const data = await resp.json();
                    if (data.success) {
                        addMessage(data.answer, 'assistant');
                    } else {
                        addMessage('❌ ' + (data.error || '请求失败'), 'assistant');
                    }
                } catch (e2) {
                    addMessage('❌ 网络错误，请确认后端服务已启动 (python app.py)', 'assistant');
                }
            }

            isLoading = false;
            btnSend.disabled = false;
            statusEl.textContent = '就绪';
            input.focus();
        }

        // Chip 点击 → 填入输入框，不发送
        function fillInput(el) {
            input.value = el.textContent;
            input.focus();
        }
    </script>
</body>
</html>
